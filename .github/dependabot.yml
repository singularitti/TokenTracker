version: 2
updates:
  # CLI runtime (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
    ignore:
      # Major bumps are reviewed manually — keep update PRs low-noise.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: chore

  # Dashboard (Vite + React + TS)
  - package-ecosystem: npm
    directory: "/dashboard"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dashboard-dependencies:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: chore

  # GitHub Actions used across all workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
